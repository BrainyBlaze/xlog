[package]
name = "xlog-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Command-line interface for the XLOG probabilistic logic engine"
readme = "../../README.md"
keywords = ["logic", "probabilistic", "cli", "datalog", "gpu"]
categories = ["command-line-utilities", "science"]

[[bin]]
name = "xlog"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
arrow = { version = "53", default-features = false, features = ["ffi", "ipc", "csv", "prettyprint"] }
thiserror.workspace = true
xlog-core = { path = "../xlog-core" }
xlog-cuda = { path = "../xlog-cuda" }
xlog-logic = { path = "../xlog-logic" }
xlog-gpu = { path = "../xlog-gpu" }
xlog-prob = { path = "../xlog-prob" }

[dev-dependencies]
assert_cmd = "2.0"
cudarc.workspace = true

[features]
default = []
host-io = ["xlog-prob/host-io"]

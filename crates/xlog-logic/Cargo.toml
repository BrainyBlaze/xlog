[package]
name = "xlog-logic"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Parser and logic layer for the XLOG language"
readme = "../../README.md"
keywords = ["logic", "probabilistic", "datalog", "parser", "inference"]
categories = ["science", "compilers"]

[dependencies]
xlog-core = { path = "../xlog-core" }
xlog-ir = { path = "../xlog-ir" }
xlog-stats = { path = "../xlog-stats" }
pest.workspace = true
pest_derive.workspace = true

[dev-dependencies]
xlog-cuda = { path = "../xlog-cuda" }
xlog-gpu = { path = "../xlog-gpu" }
xlog-runtime = { path = "../xlog-runtime" }
tempfile = "3"
serial_test = "3"

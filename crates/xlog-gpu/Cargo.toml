xlog-ir = { path = "../xlog-ir" }
xlog-logic = { path = "../xlog-logic" }
xlog-runtime = { path = "../xlog-runtime" }

[dev-dependencies]
criterion = "0.5"
serial_test = "3.0"

[[bench]]
name = "logic_bench"
harness = false

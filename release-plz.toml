[workspace]
release = false
release_always = false
dependencies_update = true
changelog_path = "CHANGELOG.md"
max_analyze_commits = 5000
pr_branch_prefix = "release-plz-"
pr_labels = ["release"]
# Keep merged release commits from immediately generating the next release PR.
# Generic `chore:` commits are treated as non-release maintenance in this repo.
release_commits = '^(feat|fix|perf|refactor|docs|build|ci|test|revert)(\([^)]+\))?:'
git_release_enable = false
git_tag_enable = false

[[package]]
name = "xlog-core"
release = true
version_group = "xlog"

[[package]]
name = "xlog-ir"
release = true
version_group = "xlog"

[[package]]
name = "xlog-cuda"
release = true
version_group = "xlog"

[[package]]
name = "xlog-stats"
release = true
version_group = "xlog"

[[package]]
name = "xlog-runtime"
release = true
version_group = "xlog"

[[package]]
name = "xlog-logic"
release = true
version_group = "xlog"

[[package]]
name = "xlog-solve"
release = true
version_group = "xlog"

[[package]]
name = "xlog-gpu"
release = true
version_group = "xlog"

[[package]]
name = "xlog-prob"
release = true
version_group = "xlog"

[[package]]
name = "xlog-cli"
release = true
version_group = "xlog"
publish_features = ["host-io"]
git_release_enable = true
git_tag_enable = true
git_tag_name = "xlog-cli-v{{ version }}"
git_release_name = "xlog-cli v{{ version }}"

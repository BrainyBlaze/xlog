[workspace]
release = false
release_always = false
dependencies_update = false
changelog_path = "CHANGELOG.md"
max_analyze_commits = 5000
pr_branch_prefix = "release-plz-"
pr_labels = ["release"]
# No `release_commits` filter: it applies PER PACKAGE, so a batch touching
# only some crates yields a partial release set, and under the shared
# [workspace.package] version a minor bump then breaks the excluded crates'
# intra-workspace requirements (`xlog-core = "^0.10.0"` cannot resolve
# against a carried 0.11.0). The "chore-only pushes do not enqueue releases"
# contract is enforced at workspace granularity in the release-plz workflow
# (worthiness check before `release-plz release-pr`).
git_release_enable = false
git_tag_enable = false

[[package]]
name = "xlog-core"
release = true
version_group = "xlog"

[[package]]
name = "xlog-ir"
release = true
version_group = "xlog"

[[package]]
name = "xlog-cuda"
release = true
version_group = "xlog"

[[package]]
name = "xlog-stats"
release = true
version_group = "xlog"

[[package]]
name = "xlog-runtime"
release = true
version_group = "xlog"

[[package]]
name = "xlog-logic"
release = true
version_group = "xlog"

[[package]]
name = "xlog-solve"
release = true
version_group = "xlog"

[[package]]
name = "xlog-gpu"
release = true
version_group = "xlog"

[[package]]
name = "xlog-prob"
release = true
version_group = "xlog"

[[package]]
name = "xlog-cli"
release = true
version_group = "xlog"
publish_features = ["host-io"]
git_release_enable = true
git_tag_enable = true
git_tag_name = "xlog-cli-v{{ version }}"
git_release_name = "xlog-cli v{{ version }}"

[[package]]
name = "pyxlog"
release = true
version_group = "xlog"
publish = false
git_only = true
changelog_update = false

[[package]]
name = "xlog-neural"
release = true
version_group = "xlog"
publish = false
git_only = true
changelog_update = false

[[package]]
name = "xlog-induce"
release = true
version_group = "xlog"
publish = false
git_only = true
changelog_update = false

<!-- xlog diagram: GPU residency model (light). Source: docs ARCHITECTURE.md "Memory Residency Contract" + gpu-residency page. Semantic state is device-resident; host launches kernels + reads bounded metadata; results exposed zero-copy via DLPack/Arrow. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="320" fill="#FBFBFD"/>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B6880"/>
    </marker>
  </defs>

  <text x="28" y="38" font-size="16" font-weight="600" fill="#1E1B2E">GPU residency model</text>
  <text x="28" y="56" font-size="11" fill="#6B6880">Reasoning state stays on the device; the host orchestrates and reads only bounded metadata.</text>

  <!-- HOST panel -->
  <text x="30" y="88" font-size="9" font-weight="600" letter-spacing="0.6" fill="#9B98B4" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">HOST</text>
  <rect x="28" y="94" width="180" height="152" rx="8" fill="#FBFBFD" stroke="#B9B7C8" stroke-width="1.25" stroke-dasharray="4 3"/>
  <rect x="44" y="120" width="148" height="44" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
  <text x="118" y="140" text-anchor="middle" font-size="12" font-weight="500" fill="#1E1B2E">Executor</text>
  <text x="118" y="154" text-anchor="middle" font-size="9.5" fill="#6B6880">orchestration</text>
  <rect x="44" y="178" width="148" height="44" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
  <text x="118" y="198" text-anchor="middle" font-size="12" font-weight="500" fill="#1E1B2E">Compiler</text>
  <text x="118" y="212" text-anchor="middle" font-size="9.5" fill="#6B6880">plan &amp; circuits</text>

  <!-- boundary arrows -->
  <text x="247" y="139" text-anchor="middle" font-size="9.5" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">launches</text>
  <path d="M208,150 H284" stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="247" y="216" text-anchor="middle" font-size="9.5" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">metadata</text>
  <path d="M284,202 H208" stroke="#6B6880" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)"/>

  <!-- DEVICE plane -->
  <path d="M286,84 H694 L706,96 V256 H286 Z" fill="#ECEBFB" stroke="#4F46E5" stroke-width="1.25"/>
  <rect x="298" y="92" width="104" height="15" rx="7.5" fill="#10B981"/>
  <text x="350" y="102.5" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF" letter-spacing="0.5" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">GPU-RESIDENT</text>

  <!-- memory budget frame -->
  <rect x="300" y="118" width="392" height="126" rx="6" fill="none" stroke="#4F46E5" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="312" y="133" font-size="9.5" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">device memory budget</text>
  <!-- state chips 2x2 -->
  <rect x="312" y="144" width="182" height="42" rx="6" fill="#FBFBFD" stroke="#1E1B2E" stroke-width="1.1"/>
  <text x="403" y="169" text-anchor="middle" font-size="11" font-weight="500" fill="#1E1B2E">relations</text>
  <rect x="500" y="144" width="182" height="42" rx="6" fill="#FBFBFD" stroke="#1E1B2E" stroke-width="1.1"/>
  <text x="591" y="169" text-anchor="middle" font-size="11" font-weight="500" fill="#1E1B2E">deltas</text>
  <rect x="312" y="194" width="182" height="42" rx="6" fill="#FBFBFD" stroke="#1E1B2E" stroke-width="1.1"/>
  <text x="403" y="219" text-anchor="middle" font-size="11" font-weight="500" fill="#1E1B2E">circuit values</text>
  <rect x="500" y="194" width="182" height="42" rx="6" fill="#FBFBFD" stroke="#1E1B2E" stroke-width="1.1"/>
  <text x="591" y="219" text-anchor="middle" font-size="11" font-weight="500" fill="#1E1B2E">solver state</text>

  <!-- zero-copy port to consumers -->
  <text x="811" y="140" text-anchor="middle" font-size="9" fill="#10B981" font-weight="600" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">zero-copy</text>
  <path d="M706,180 H748" stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <rect x="750" y="150" width="122" height="60" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
  <text x="811" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#1E1B2E">DLPack &amp; Arrow</text>
  <text x="811" y="190" text-anchor="middle" font-size="9.5" fill="#6B6880">PyTorch &#183; JAX &#183; cuDF</text>

  <text x="28" y="300" font-size="10.5" fill="#6B6880">Relations, deltas, circuit values, and solver state stay device-resident. Strict mode fails closed with a typed error when a plan exceeds the budget.</text>
</svg>

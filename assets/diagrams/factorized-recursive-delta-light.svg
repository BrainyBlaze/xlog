<!-- xlog diagram: factorized recursive delta routing (light). Source: architecture/factorized-execution-internals.mdx "Recursive Delta Factorization". Inside the semi-naive loop, the delta join routes dense (root-indexed bitvectors) | sparse (GPU hash set) | legacy (join+diff); all three produce the same novel set. Main-only, unreleased beyond 0.9.2. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="280" fill="#FBFBFD"/>
  <defs>
    <marker id="afr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B6880"/>
    </marker>
  </defs>

  <text x="28" y="38" font-size="16" font-weight="600" fill="#1E1B2E">Factorized recursive deltas</text>
  <text x="28" y="56" font-size="11" fill="#6B6880">Inside the semi-naive loop, the delta join picks one of three routes; every route yields the same novel set.</text>

  <!-- delta join input -->
  <rect x="28" y="112" width="140" height="56" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
  <rect x="29.5" y="114" width="3.5" height="52" rx="1.75" fill="#4F46E5"/>
  <text x="98" y="134" text-anchor="middle" font-size="12" font-weight="600" fill="#1E1B2E">Delta join</text>
  <text x="98" y="150" text-anchor="middle" font-size="9.5" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">&#916; &#8904; edge</text>
  <path d="M168,140 H198" stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#afr)"/>

  <!-- router diamond -->
  <polygon points="248,100 300,140 248,180 196,140" fill="#F3F3F8" stroke="#4F46E5" stroke-width="1.25"/>
  <text x="248" y="136" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1E1B2E">route</text>
  <text x="248" y="150" text-anchor="middle" font-size="8.5" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">domain &#183; budget</text>

  <!-- three routes -->
  <g stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#afr)">
    <path d="M279,116 C330,84 350,84 386,84"/>
    <path d="M300,140 H386"/>
    <path d="M279,164 C330,196 350,196 386,196"/>
  </g>

  <!-- Dense (GPU) -->
  <path d="M388,60 H560 L572,72 V108 H388 Z" fill="#ECEBFB" stroke="#4F46E5" stroke-width="1.25"/>
  <rect x="398" y="67" width="30" height="13" rx="6.5" fill="#10B981"/>
  <text x="413" y="76.5" text-anchor="middle" font-size="7.5" font-weight="600" fill="#FFFFFF" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">GPU</text>
  <text x="480" y="83" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1E1B2E">Dense</text>
  <text x="480" y="98" text-anchor="middle" font-size="9" fill="#6B6880">root-indexed bitvectors, bounded domain</text>

  <!-- Sparse (GPU) -->
  <path d="M388,116 H560 L572,128 V164 H388 Z" fill="#ECEBFB" stroke="#4F46E5" stroke-width="1.25"/>
  <rect x="398" y="123" width="30" height="13" rx="6.5" fill="#10B981"/>
  <text x="413" y="132.5" text-anchor="middle" font-size="7.5" font-weight="600" fill="#FFFFFF" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">GPU</text>
  <text x="480" y="139" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1E1B2E">Sparse</text>
  <text x="480" y="154" text-anchor="middle" font-size="9" fill="#6B6880">open-addressing hash set of candidates</text>

  <!-- Legacy -->
  <rect x="388" y="172" width="184" height="48" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
  <text x="480" y="192" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1E1B2E">Legacy</text>
  <text x="480" y="207" text-anchor="middle" font-size="9" fill="#6B6880">hash join, then diff against full</text>

  <!-- converge -->
  <g stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#afr)">
    <path d="M572,84 C620,84 620,128 662,132"/>
    <path d="M572,140 H662"/>
    <path d="M572,196 C620,196 620,152 662,148"/>
  </g>
  <rect x="664" y="112" width="148" height="56" rx="7" fill="#F3F3F8" stroke="#10B981" stroke-width="1.25"/>
  <text x="738" y="134" text-anchor="middle" font-size="12" font-weight="600" fill="#1E1B2E">Same novel set</text>
  <text x="738" y="150" text-anchor="middle" font-size="9.5" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">&#916;&#8242; = new &#8722; full</text>

  <!-- loop-back into semi-naive -->
  <path d="M738,168 V240 H98 V170" stroke="#6B6880" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#afr)"/>
  <text x="240" y="252" text-anchor="middle" font-size="9.5" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">next semi-naive round</text>

  <text x="28" y="274" font-size="10.5" fill="#6B6880">The router checks domain size and byte budget; declines fall through dense &#8594; sparse &#8594; legacy. XLOG_DISABLE_FACTORIZED_DELTA forces legacy for parity.</text>
</svg>

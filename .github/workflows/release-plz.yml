name: release-plz

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm_gpu_validation:
        description: Confirm that scripts/validate_release_gpu.sh --mode release passed on the release commit.
        required: true
        type: boolean
      gpu_validation_notes:
        description: Reference the host, commit, and evidence for the manual GPU validation run.
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release-plz:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.1.1-devel-ubuntu22.04
    defaults:
      run:
        shell: bash
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      cli_release_created: ${{ steps.release.outputs.cli_release_created }}
      cli_tag_name: ${{ steps.release.outputs.cli_tag_name }}
      release_prs_json: ${{ steps.release.outputs.release_prs_json }}
    env:
      XLOG_NO_CUBIN: "1"
      GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_GITHUB_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Require release-plz GitHub token
        env:
          RELEASE_PLZ_GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_PLZ_GITHUB_TOKEN" ]]; then
            echo "RELEASE_PLZ_GITHUB_TOKEN is required on BrainyBlaze/xlog because the organization blocks GitHub Actions from creating pull requests with github.token." >&2
            exit 1
          fi

      - name: Require explicit GPU gate acknowledgement
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          if [[ "${{ inputs.confirm_gpu_validation }}" != "true" ]]; then
            echo "workflow_dispatch releases require confirm_gpu_validation=true" >&2
            exit 1
          fi
          if [[ -z "${{ inputs.gpu_validation_notes }}" ]]; then
            echo "workflow_dispatch releases require gpu_validation_notes" >&2
            exit 1
          fi

      - name: Require publish secrets
        if: github.event_name == 'workflow_dispatch'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$CARGO_REGISTRY_TOKEN" ]]; then
            echo "CARGO_REGISTRY_TOKEN is required for release publication." >&2
            exit 1
          fi
          if [[ -z "$PYPI_API_TOKEN" ]]; then
            echo "PYPI_API_TOKEN is required for release publication." >&2
            exit 1
          fi

      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            git \
            jq \
            pkg-config \
            python3 \
            python3-dev \
            python3-pip

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Trust checkout path for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Show CUDA toolkit
        run: nvcc --version

      - name: Install release-plz toolchain
        run: |
          set -euo pipefail
          install_root="$HOME/.cargo/bin"
          mkdir -p "$install_root"
          curl -fsSL \
            "https://github.com/release-plz/release-plz/releases/download/release-plz-v0.3.157/release-plz-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C "$install_root" release-plz
          curl -fsSL \
            "https://github.com/obi1kenobi/cargo-semver-checks/releases/download/v0.46.0/cargo-semver-checks-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C "$install_root" cargo-semver-checks
          echo "$install_root" >> "$GITHUB_PATH"
          "$install_root/release-plz" --version
          "$install_root/cargo-semver-checks" semver-checks --version

      - name: Configure git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Preflight crate publish verification
        if: github.event_name == 'workflow_dispatch'
        run: bash scripts/preflight_release_publish.sh

      - name: Run release-plz
        id: release
        run: |
          set -euo pipefail
          command="${{ github.event_name == 'workflow_dispatch' && 'release' || 'release-pr' }}"
          {
            echo "releases_created=false"
            echo "cli_release_created=false"
            echo "cli_tag_name="
            echo "release_prs_json=[]"
          } >> "$GITHUB_OUTPUT"

          if [[ "$command" == "release-pr" ]]; then
            release_pr_output=$(release-plz release-pr \
              --git-token "$GITHUB_TOKEN" \
              --repo-url "https://github.com/${GITHUB_REPOSITORY}" \
              --config release-plz.toml \
              -o json)
            echo "release_pr_output: $release_pr_output"

            prs=$(echo "$release_pr_output" | jq -c '.prs')
            prs_length=$(echo "$prs" | jq 'length')
            if [[ "$prs_length" != "0" ]]; then
              prs_created=true
            else
              prs_created=false
            fi

            {
              echo "prs_created=$prs_created"
              echo "release_prs_json=$prs"
            } >> "$GITHUB_OUTPUT"
          else
            release_output=$(release-plz release \
              --git-token "$GITHUB_TOKEN" \
              --token "$CARGO_REGISTRY_TOKEN" \
              --config release-plz.toml \
              -o json)
            echo "release_output: $release_output"

            releases=$(echo "$release_output" | jq -c '.releases')
            releases_length=$(echo "$releases" | jq 'length')
            if [[ "$releases_length" != "0" ]]; then
              releases_created=true
            else
              releases_created=false
              if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                echo "release-plz release produced no releases. This repository only publishes from commits associated with merged release-plz PRs." >&2
                echo "If you merged post-release fixes directly onto main, open and merge a follow-up PR whose branch name starts with release-plz- and rerun workflow_dispatch from that merge commit." >&2
                exit 1
              fi
            fi

            cli_release=$(echo "$releases" | jq -c '[.[] | select(.package_name == "xlog-cli")]')
            cli_release_length=$(echo "$cli_release" | jq 'length')
            if [[ "$cli_release_length" != "0" ]]; then
              cli_release_created=true
              cli_tag_name=$(echo "$cli_release" | jq -r '.[0].tag')
            else
              cli_release_created=false
              cli_tag_name=""
            fi

            {
              echo "releases_created=$releases_created"
              echo "cli_release_created=$cli_release_created"
              echo "cli_tag_name=$cli_tag_name"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Sync README release version in release PR branches
        if: github.event_name != 'workflow_dispatch' && steps.release.outputs.prs_created == 'true'
        env:
          RELEASE_PRS_JSON: ${{ steps.release.outputs.release_prs_json }}
        run: |
          set -euo pipefail
          mapfile -t release_branches < <(jq -r '.[].head_branch' <<<"$RELEASE_PRS_JSON")

          for release_branch in "${release_branches[@]}"; do
            git fetch origin "$release_branch"
            git checkout -B "$release_branch" "origin/$release_branch"

            python3 scripts/sync_readme_release_version.py

            if git diff --quiet -- README.md; then
              echo "README already synced for $release_branch"
              continue
            fi

            workspace_version=$(python3 - <<'PY'
            from pathlib import Path
            from scripts.sync_readme_release_version import workspace_version

            print(workspace_version(Path("Cargo.toml").read_text(encoding="utf-8")))
            PY
            )

            git add README.md
            git commit -m "docs: sync README release status for v${workspace_version}"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
              "HEAD:${release_branch}"
          done

          git checkout --detach "$GITHUB_SHA"

      - name: Summarize release-plz result
        run: |
          {
            echo "## release-plz"
            echo
            echo "- command: \`${{ github.event_name == 'workflow_dispatch' && 'release' || 'release-pr' }}\`"
            echo "- releases created: \`${{ steps.release.outputs.releases_created }}\`"
            echo "- xlog-cli release created: \`${{ steps.release.outputs.cli_release_created }}\`"
            echo "- xlog-cli tag: \`${{ steps.release.outputs.cli_tag_name || 'n/a' }}\`"
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "- GPU validation: ${{ inputs.gpu_validation_notes }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  python-publish:
    needs: release-plz
    if: needs.release-plz.outputs.cli_release_created == 'true'
    uses: ./.github/workflows/python-publish.yml
    with:
      tag_name: ${{ needs.release-plz.outputs.cli_tag_name }}
    secrets: inherit

  github-release-assets:
    needs: release-plz
    if: needs.release-plz.outputs.cli_release_created == 'true'
    uses: ./.github/workflows/github-release.yml
    with:
      tag_name: ${{ needs.release-plz.outputs.cli_tag_name }}
    secrets: inherit

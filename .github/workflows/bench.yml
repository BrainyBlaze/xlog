name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      baseline:
        description: Optional branch, tag, or ref to benchmark against
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  benchmark:
    name: Performance Benchmarks
    runs-on: [self-hosted, linux, x64, cuda]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0  # Full history for baseline comparison

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Check GPU availability
        run: |
          nvidia-smi || echo "Warning: nvidia-smi failed, GPU benchmarks may be skipped"

      - name: Build benchmarks
        run: cargo build --release --benches

      - name: Run current benchmarks
        run: |
          cargo bench --no-fail-fast -- \
            --save-baseline current_${{ github.sha }} \
            --noplot

      - name: Compare against requested baseline
        if: ${{ inputs.baseline != '' }}
        env:
          BASELINE_REF: ${{ inputs.baseline }}
        run: |
          set -euo pipefail
          current_ref=$(git rev-parse HEAD)
          git fetch origin "$BASELINE_REF" --depth=1
          git checkout --detach FETCH_HEAD

          cargo bench --no-fail-fast -- \
            --save-baseline requested_baseline \
            --noplot || echo "Requested baseline benchmark run failed, continuing..."

          git checkout --detach "$current_ref"

          cargo bench --no-fail-fast -- \
            --baseline requested_baseline \
            --load-baseline current_${{ github.sha }} \
            --noplot 2>&1 | tee benchmark_comparison.txt

          if grep -E "Performance has regressed" benchmark_comparison.txt; then
            echo "::warning::Performance regressions detected. Review benchmark_comparison.txt"
          fi

      - name: Generate benchmark report
        run: |
          {
            echo "## Benchmark Results"
            echo
            echo "Commit: \`${{ github.sha }}\`"
            echo

            # List benchmark groups
            echo "### Benchmark Groups"
            echo
            echo "- **xlog-gpu**: Transitive closure, hash joins, aggregation"
            echo "- **xlog-prob**: Exact inference (DDNNF), Monte Carlo"
            echo "- **xlog-stats**: Statistics manager"
            echo "- **xlog-solve**: SAT solver"
            echo

            if [ -f benchmark_comparison.txt ]; then
              echo "### Comparison with requested baseline"
              echo
              echo "\`\`\`"
              head -100 benchmark_comparison.txt
              echo "\`\`\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            target/criterion/
            benchmark_comparison.txt
          retention-days: 30

      - name: Check for regressions
        if: ${{ inputs.baseline != '' }}
        run: |
          if [ -f benchmark_comparison.txt ]; then
            REGRESSED=$(grep -c "Performance has regressed" benchmark_comparison.txt || true)
            if [ "$REGRESSED" -gt "0" ]; then
              echo "::error::$REGRESSED benchmark(s) show significant performance regression"
              echo "Review the benchmark results artifact for details"
            fi
          fi

name: python-publish

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing xlog-cli release tag to publish Python artifacts for.
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    container:
      image: nvidia/cuda:13.1.1-devel-ubuntu22.04
    env:
      XLOG_NO_CUBIN: "1"
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config \
            software-properties-common

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Python
        run: |
          set -euo pipefail
          python_pkg="python${{ matrix.python-version }}"
          pip_bootstrap_url="https://bootstrap.pypa.io/get-pip.py"
          if [[ "${{ matrix.python-version }}" == "3.8" ]]; then
            pip_bootstrap_url="https://bootstrap.pypa.io/pip/3.8/get-pip.py"
          fi
          add-apt-repository ppa:deadsnakes/ppa -y
          apt-get update
          packages=("$python_pkg" "${python_pkg}-dev" "${python_pkg}-venv")
          if apt-cache show "${python_pkg}-distutils" >/dev/null 2>&1; then
            packages+=("${python_pkg}-distutils")
          fi
          DEBIAN_FRONTEND=noninteractive apt-get install -y "${packages[@]}"
          curl -fsSL "$pip_bootstrap_url" -o /tmp/get-pip.py
          "$python_pkg" /tmp/get-pip.py
          echo "PYTHON_BIN=$(command -v "$python_pkg")" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Show CUDA toolkit
        run: nvcc --version

      - name: Install maturin
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip maturin

      - name: Stage pyxlog kernels
        run: bash scripts/stage_pyxlog_kernels.sh

      - name: Build wheel
        run: |
          maturin build -m crates/pyxlog/Cargo.toml --release --compatibility linux --out dist -i "$PYTHON_BIN"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: pyxlog-wheel-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.1.1-devel-ubuntu22.04
    env:
      XLOG_NO_CUBIN: "1"
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config \
            python3 \
            python3-pip

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: python3 -m pip install --upgrade pip maturin

      - name: Build source distribution
        run: maturin sdist -m crates/pyxlog/Cargo.toml --out dist

      - name: Upload source distribution
        uses: actions/upload-artifact@v7
        with:
          name: pyxlog-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs:
      - build-wheel
      - build-sdist
    runs-on: ubuntu-latest
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          pattern: pyxlog-*
          path: dist
          merge-multiple: true

      - name: Require PyPI token
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$PYPI_API_TOKEN" ]]; then
            echo "PYPI_API_TOKEN is required to publish pyxlog." >&2
            exit 1
          fi

      - name: Attach Python distributions to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag_name }}" dist/* --clobber

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

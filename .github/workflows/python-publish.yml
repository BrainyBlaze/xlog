name: python-publish

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04
    env:
      XLOG_NO_CUBIN: "1"
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Show CUDA toolkit
        run: nvcc --version

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build wheel
        run: maturin build -m crates/pyxlog/Cargo.toml --release --compatibility linux --out dist -i python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyxlog-wheel-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04
    env:
      XLOG_NO_CUBIN: "1"
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config \
            python3 \
            python3-pip

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: python3 -m pip install --upgrade pip maturin

      - name: Build source distribution
        run: maturin sdist -m crates/pyxlog/Cargo.toml --out dist

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: pyxlog-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs:
      - build-wheel
      - build-sdist
    runs-on: ubuntu-latest
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          pattern: pyxlog-*
          path: dist
          merge-multiple: true

      - name: Require PyPI token
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$PYPI_API_TOKEN" ]]; then
            echo "PYPI_API_TOKEN is required to publish pyxlog." >&2
            exit 1
          fi

      - name: Attach Python distributions to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag_name }}" dist/* --clobber

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

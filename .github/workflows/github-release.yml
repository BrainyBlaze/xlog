name: github-release

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing xlog-cli release tag to attach CLI artifacts to.
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  upload-cli-archive:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.1.1-devel-ubuntu22.04
    env:
      XLOG_NO_CUBIN: "1"
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            gh \
            git \
            pkg-config \
            python3 \
            python3-dev \
            python3-pip

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Trust checkout path for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install Rust toolchain
        run: bash scripts/install_rust_toolchain.sh --toolchain stable

      - name: Show CUDA toolkit
        run: nvcc --version

      - name: Build CLI archive
        run: bash scripts/package_cli_release.sh --output dist

      - name: Write checksums
        run: |
          cd dist
          sha256sum ./*.tar.gz > SHA256SUMS

      - name: Attach CLI archive to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag_name }}" dist/*.tar.gz dist/SHA256SUMS --clobber

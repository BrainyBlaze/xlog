name: cuda-ci

on:
  workflow_dispatch:

jobs:
  rust-tests:
    runs-on: [self-hosted, linux, x64, cuda]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo test (release)
        run: cargo test --workspace --all-targets --release

  python-wheel:
    runs-on: [self-hosted, linux, x64, cuda]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Build wheel
        working-directory: crates/pyxlog
        run: maturin build --release --out dist
      - name: Install wheel
        working-directory: crates/pyxlog
        run: python -m pip install --force-reinstall dist/*.whl
      - name: Smoke test import + evaluate
        run: |
          python - <<'PY'
          import pyxlog
          print("pyxlog version:", pyxlog.__version__)

          logic_src = r"""
          pred edge(i64, i64).
          pred reach(i64, i64).

          edge(1, 2).
          edge(2, 3).

          reach(X, Y) :- edge(X, Y).
          reach(X, Z) :- reach(X, Y), edge(Y, Z).

          ?- reach(X, Y).
          """.strip()

          logic = pyxlog.LogicProgram.compile(logic_src, device=0, memory_mb=1024)
          logic_res = logic.evaluate()
          assert len(logic_res.queries) == 1

          prob_src = r"""
          0.7::rain().
          0.2::sprinkler().
          wet() :- rain().
          wet() :- sprinkler().
          evidence(wet(), true).
          query(rain()).
          query(sprinkler()).
          """.strip()

          prob = pyxlog.Program.compile(prob_src, device=0, memory_mb=1024)
          prob_res = prob.evaluate(return_grads=False)
          assert len(prob_res.atoms) == 2

          mc_src = r"""
          #pragma prob_engine = mc

          0.5::flip().

          p() :- flip().
          q() :- not p().
          p() :- not q().

          query(p()).
          query(flip()).
          """.strip()

          mc = pyxlog.Program.compile(mc_src, device=0, memory_mb=1024)
          mc_res = mc.evaluate(return_grads=False, samples=20000, seed=123, confidence=0.95, max_nonmonotone_iterations=256)
          assert len(mc_res.atoms) == 2
          assert mc_res.approx is True
          assert mc_res.stderr is not None
          assert mc_res.ci_low is not None
          assert mc_res.ci_high is not None
          assert mc_res.samples == 20000
          PY

name: ci

# Local validation:
#   make lint-workflows  # actionlint + shellcheck for workflow YAML and embedded bash
#   make lint-shell      # shellcheck for repo shell scripts
#   make check-tracked-ignored  # tracked files must not match .gitignore

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install actionlint and shellcheck
        env:
          ACTIONLINT_VERSION: 1.7.7
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck
          curl -sSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz actionlint
          install actionlint /usr/local/bin/actionlint

      - name: Run actionlint
        run: actionlint -color

  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(rg --files scripts .github -g '*.sh')
          if ((${#files[@]} == 0)); then
            echo "No shell scripts found."
            exit 0
          fi
          printf '%s\n' "${files[@]}"
          shellcheck "${files[@]}"

  git-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate tracked files are not ignored
        shell: bash
        run: |
          set -euo pipefail
          files=$(git ls-files -ci --exclude-standard)
          if [[ -n "$files" ]]; then
            echo "Tracked files must not match .gitignore rules:"
            printf '%s\n' "$files"
            exit 1
          fi
          echo "No tracked files match .gitignore rules."

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  package-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Validate doctor help
        run: python scripts/xlog_doctor.py --help

      - name: Validate release doctor mode
        run: python scripts/xlog_doctor.py --workflow release --json > /tmp/xlog-doctor-release.json

      - name: Export cargo metadata
        run: cargo metadata --locked --no-deps --format-version=1 > cargo-metadata.json

      - name: Validate publishable crate manifests
        run: |
          set -euo pipefail
          crates=(
            xlog-core
            xlog-ir
            xlog-cuda
            xlog-stats
            xlog-runtime
            xlog-logic
            xlog-solve
            xlog-gpu
            xlog-prob
            xlog-cli
          )
          for crate in "${crates[@]}"; do
            echo "Validating cargo package metadata for $crate"
            cargo package --locked --allow-dirty --no-verify --list -p "$crate" >/dev/null
          done

      - name: Validate README quickstart assumptions
        run: python scripts/validate_package_metadata.py

  clippy-high-signal:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.1.1-devel-ubuntu22.04
    env:
      XLOG_NO_CUBIN: "1"
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config \
            python3 \
            python3-dev \
            python3-pip

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        run: bash scripts/install_rust_toolchain.sh --toolchain stable --component clippy

      - name: Show CUDA toolkit
        run: nvcc --version

      - name: Run clippy high-signal policy
        run: |
          # Full -D warnings is still broad repo-wide debt. Keep public CI honest by
          # gating on high-signal lints we can maintain across all targets today.
          cargo clippy --workspace --all-targets --locked --no-deps -- \
            -A clippy::approx_constant \
            -D clippy::dbg_macro \
            -D clippy::todo \
            -D clippy::unimplemented

  cuda-build-no-gpu:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.1.1-devel-ubuntu22.04
    env:
      XLOG_NO_CUBIN: "1"
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            git \
            pkg-config \
            python3 \
            python3-dev \
            python3-pip

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        run: bash scripts/install_rust_toolchain.sh --toolchain stable

      - name: Show CUDA toolkit
        run: nvcc --version

      - name: Build workspace without GPU execution
        run: cargo build --workspace --locked --release --exclude pyxlog

      - name: Build host-io CLI variant
        run: cargo build --locked --release -p xlog-cli --features host-io

      - name: Install maturin
        run: python3 -m pip install --upgrade pip maturin

      - name: Build pyxlog wheel without GPU execution
        run: maturin build -m crates/pyxlog/Cargo.toml --release --compatibility manylinux_2_28 --out dist

name: Feature Request
description: Propose a new capability or improvement.
title: "[feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please explain the problem first. Requests tied to the supported public platform are easier to prioritize.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the API, workflow, or behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other approaches have you tried?
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps or current workflow
      description: If this request is driven by a current limitation, show the steps or workflow that exposes it.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What outcome do you want instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior today
      description: What happens now, and why is it insufficient?
    validations:
      required: true
  - type: dropdown
    id: supported-platform
    attributes:
      label: Is this request for the supported platform contract?
      options:
        - "Yes: Linux x86_64 + NVIDIA GPU + CUDA 13.x"
        - "No"
        - "Partly"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment context
      description: Include environment details if this request is tied to setup, packaging, or runtime behavior.
      placeholder: |
        OS and architecture:
        GPU model:
        NVIDIA driver version:
        CUDA toolkit/runtime version:
        Rust/Python versions if relevant:
  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: How should maintainers evaluate whether this request is done?
    validations:
      required: true

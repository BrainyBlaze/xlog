<!-- xlog diagram: neural-symbolic training loop (dark). Source: README + dilp-training. Network produces predicate probabilities; the cached XGCF circuit evaluates the query; loss backpropagates through the circuit to network weights. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="240" fill="#0E0E16"/>
  <defs>
    <marker id="and2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9B98B4"/>
    </marker>
  </defs>

  <text x="28" y="38" font-size="16" font-weight="600" fill="#E7E6F0">Neural-symbolic training loop</text>
  <text x="28" y="56" font-size="11" fill="#9B98B4">A neural network feeds predicate probabilities into a cached circuit; the loss backpropagates through it to the weights.</text>

  <rect x="48" y="96" width="180" height="62" rx="7" fill="#171626" stroke="#E7E6F0" stroke-width="1.25"/>
  <rect x="49.5" y="98" width="3.5" height="58" rx="1.75" fill="#FB7185"/>
  <text x="138" y="122" text-anchor="middle" font-size="12.5" font-weight="600" fill="#E7E6F0">Neural network</text>
  <text x="138" y="139" text-anchor="middle" font-size="9.5" fill="#9B98B4">PyTorch predicates</text>

  <text x="294" y="120" text-anchor="middle" font-size="9.5" fill="#9B98B4" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">p(fact)</text>
  <path d="M228,127 H358" stroke="#9B98B4" stroke-width="1.5" fill="none" marker-end="url(#and2)"/>

  <path d="M360,96 H528 L540,108 V158 H360 Z" fill="#1C1A33" stroke="#8B83F0" stroke-width="1.25"/>
  <rect x="372" y="103" width="30" height="13" rx="6.5" fill="#10B981"/>
  <text x="387" y="112.5" text-anchor="middle" font-size="7.5" font-weight="600" fill="#0E0E16" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">GPU</text>
  <text x="450" y="130" text-anchor="middle" font-size="12.5" font-weight="600" fill="#E7E6F0">XGCF circuit</text>
  <text x="450" y="147" text-anchor="middle" font-size="9.5" fill="#9B98B4">cached across steps</text>

  <text x="606" y="120" text-anchor="middle" font-size="9.5" fill="#9B98B4" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">P(query)</text>
  <path d="M540,127 H670" stroke="#9B98B4" stroke-width="1.5" fill="none" marker-end="url(#and2)"/>

  <rect x="672" y="96" width="180" height="62" rx="7" fill="#171626" stroke="#E7E6F0" stroke-width="1.25"/>
  <text x="762" y="122" text-anchor="middle" font-size="12.5" font-weight="600" fill="#E7E6F0">Loss</text>
  <text x="762" y="139" text-anchor="middle" font-size="9.5" fill="#9B98B4">vs. target label</text>

  <path d="M762,158 V192 H138 V160" stroke="#9B98B4" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#and2)"/>
  <text x="450" y="186" text-anchor="middle" font-size="9.5" fill="#9B98B4" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">gradients back through the circuit &#8594; network weights</text>

  <text x="28" y="228" font-size="10.5" fill="#9B98B4">Only weights change between iterations; the circuit structure is compiled once and reused, keeping every step GPU-resident.</text>
</svg>

<!-- xlog diagram: architecture overview (light). Source of truth: docs ARCHITECTURE.md reasoning stack + crate structure. One shared frontend fans into four paradigm IRs; all execute on the GPU kernel provider. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="400" fill="#FBFBFD"/>
  <defs>
    <marker id="aa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B6880"/>
    </marker>
  </defs>

  <text x="28" y="38" font-size="16" font-weight="600" fill="#1E1B2E">XLOG architecture</text>
  <text x="28" y="56" font-size="11" fill="#6B6880">One typed frontend fans into four reasoning paradigms; all of them execute on a shared GPU kernel provider.</text>

  <!-- Source -->
  <rect x="390" y="76" width="120" height="38" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
  <text x="450" y="100" text-anchor="middle" font-size="12.5" font-weight="500" fill="#1E1B2E">Source</text>
  <path d="M450,114 V132" stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#aa)"/>

  <!-- Shared frontend -->
  <rect x="90" y="134" width="720" height="46" rx="8" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
  <text x="450" y="156" text-anchor="middle" font-size="12.5" font-weight="500" fill="#1E1B2E">Shared frontend</text>
  <text x="450" y="171" text-anchor="middle" font-size="10" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">parser &#183; stratifier &#183; lowerer &#183; optimizer</text>

  <!-- fan to paradigm cards -->
  <g stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#aa)">
    <path d="M135,180 V212"/><path d="M345,180 V212"/><path d="M555,180 V212"/><path d="M765,180 V212"/>
  </g>

  <!-- paradigm cards -->
  <!-- Deterministic -->
  <g>
    <rect x="40" y="214" width="190" height="78" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
    <rect x="41.5" y="216" width="3.5" height="74" rx="1.75" fill="#4F46E5"/>
    <text x="60" y="238" font-size="12.5" font-weight="600" fill="#1E1B2E">Deterministic</text>
    <text x="60" y="255" font-size="10.5" fill="#6B6880">Datalog &amp; recursion</text>
    <rect x="60" y="264" width="52" height="17" rx="8.5" fill="#4F46E5" fill-opacity="0.13"/>
    <text x="86" y="276" text-anchor="middle" font-size="9.5" font-weight="600" fill="#4F46E5" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">RIR</text>
  </g>
  <!-- Probabilistic -->
  <g>
    <rect x="250" y="214" width="190" height="78" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
    <rect x="251.5" y="216" width="3.5" height="74" rx="1.75" fill="#7C3AED"/>
    <text x="270" y="238" font-size="12.5" font-weight="600" fill="#1E1B2E">Probabilistic</text>
    <text x="270" y="255" font-size="10.5" fill="#6B6880">exact &amp; Monte Carlo</text>
    <rect x="270" y="264" width="96" height="17" rx="8.5" fill="#7C3AED" fill-opacity="0.13"/>
    <text x="318" y="276" text-anchor="middle" font-size="9.5" font-weight="600" fill="#7C3AED" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">PIR &#8594; XGCF</text>
  </g>
  <!-- Epistemic -->
  <g>
    <rect x="460" y="214" width="190" height="78" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
    <rect x="461.5" y="216" width="3.5" height="74" rx="1.75" fill="#0891B2"/>
    <text x="480" y="238" font-size="12.5" font-weight="600" fill="#1E1B2E">Epistemic</text>
    <text x="480" y="255" font-size="10.5" fill="#6B6880">world views</text>
    <rect x="480" y="264" width="52" height="17" rx="8.5" fill="#0891B2" fill-opacity="0.13"/>
    <text x="506" y="276" text-anchor="middle" font-size="9.5" font-weight="600" fill="#0891B2" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">EIR</text>
  </g>
  <!-- Solver -->
  <g>
    <rect x="670" y="214" width="190" height="78" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
    <rect x="671.5" y="216" width="3.5" height="74" rx="1.75" fill="#D97706"/>
    <text x="690" y="238" font-size="12.5" font-weight="600" fill="#1E1B2E">Solver</text>
    <text x="690" y="255" font-size="10.5" fill="#6B6880">SAT &amp; MaxSAT</text>
    <rect x="690" y="264" width="52" height="17" rx="8.5" fill="#D97706" fill-opacity="0.13"/>
    <text x="716" y="276" text-anchor="middle" font-size="9.5" font-weight="600" fill="#D97706" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">SIR</text>
  </g>

  <!-- cards to device plane -->
  <g stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#aa)">
    <path d="M135,292 V320"/><path d="M345,292 V320"/><path d="M555,292 V320"/><path d="M765,292 V320"/>
  </g>

  <!-- device plane -->
  <path d="M90,322 H798 L810,334 V378 H90 Z" fill="#ECEBFB" stroke="#4F46E5" stroke-width="1.25"/>
  <rect x="100" y="328" width="104" height="15" rx="7.5" fill="#10B981"/>
  <text x="152" y="338.5" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF" letter-spacing="0.5" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">GPU-RESIDENT</text>
  <text x="450" y="356" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1E1B2E">GPU kernel provider</text>
  <text x="450" y="371" text-anchor="middle" font-size="10" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">joins &#183; sort &#183; group-by &#183; circuits &#183; CDCL</text>

  <text x="28" y="394" font-size="10.5" fill="#6B6880">Neural-symbolic training runs over the deterministic and probabilistic paths, learning rule weights and neural predicates end-to-end.</text>
</svg>

<!-- xlog diagram: knowledge compilation (light). Source: docs ARCHITECTURE.md "Knowledge Compilation Pipeline" + probabilistic/engines page. PIR -> CNF -> GPU d-DNNF (compile+verify) -> XGCF -> weighted model counting; compile once, evaluate many. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 224" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="224" fill="#FBFBFD"/>
  <defs>
    <marker id="ak" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B6880"/>
    </marker>
  </defs>

  <text x="28" y="38" font-size="16" font-weight="600" fill="#1E1B2E">Exact inference by knowledge compilation</text>
  <text x="28" y="56" font-size="11" fill="#6B6880">The circuit is compiled once; evaluation and gradients then run many times over the same structure.</text>

  <!-- nodes -->
  <g>
    <rect x="28" y="96" width="118" height="58" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
    <rect x="29.5" y="98" width="3.5" height="54" rx="1.75" fill="#7C3AED"/>
    <text x="87" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#1E1B2E">PIR</text>
    <text x="87" y="135" text-anchor="middle" font-size="9.5" fill="#6B6880">provenance</text>
    <path d="M146,125 H166" stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#ak)"/>

    <rect x="168" y="96" width="118" height="58" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
    <rect x="169.5" y="98" width="3.5" height="54" rx="1.75" fill="#7C3AED"/>
    <text x="227" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#1E1B2E">CNF</text>
    <text x="227" y="135" text-anchor="middle" font-size="9.5" fill="#6B6880">Tseitin encode</text>
    <path d="M286,125 H306" stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#ak)"/>

    <rect x="308" y="96" width="150" height="58" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
    <rect x="309.5" y="98" width="3.5" height="54" rx="1.75" fill="#7C3AED"/>
    <rect x="322" y="104" width="30" height="13" rx="6.5" fill="#10B981"/>
    <text x="337" y="113.5" text-anchor="middle" font-size="7.5" font-weight="600" fill="#FFFFFF" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">GPU</text>
    <text x="391" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#1E1B2E">Decision-DNNF</text>
    <text x="391" y="143" text-anchor="middle" font-size="9.5" fill="#6B6880">compile + CDCL verify</text>
    <path d="M458,125 H478" stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#ak)"/>

    <path d="M480,96 H598 L610,108 V154 H480 Z" fill="#ECEBFB" stroke="#4F46E5" stroke-width="1.25"/>
    <rect x="492" y="104" width="30" height="13" rx="6.5" fill="#10B981"/>
    <text x="507" y="113.5" text-anchor="middle" font-size="7.5" font-weight="600" fill="#FFFFFF" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">GPU</text>
    <text x="545" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#1E1B2E">XGCF</text>
    <text x="545" y="145" text-anchor="middle" font-size="9.5" fill="#6B6880">circuit format</text>
    <path d="M610,125 H630" stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#ak)"/>

    <rect x="632" y="96" width="160" height="58" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
    <rect x="633.5" y="98" width="3.5" height="54" rx="1.75" fill="#7C3AED"/>
    <text x="712" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#1E1B2E">Weighted model count</text>
    <text x="712" y="135" text-anchor="middle" font-size="9.5" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">log P(query | evidence)</text>
  </g>

  <!-- gradients backward -->
  <path d="M700,154 C650,194 600,194 547,156" stroke="#6B6880" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#ak)"/>
  <text x="623" y="192" text-anchor="middle" font-size="9.5" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">gradients (backward)</text>

  <!-- compile-once bracket -->
  <path d="M28,168 V174 H610 V168" fill="none" stroke="#B9B7C8" stroke-width="1"/>
  <text x="319" y="188" text-anchor="middle" font-size="10" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">compile once</text>
</svg>

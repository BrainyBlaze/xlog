<!-- xlog diagram: epistemic Generate-Propagate-Test (light). Source: epistemic-solver-semantics-guide. Candidate world views are generated, propagated (pruned), and tested on the GPU; founded world views are accepted. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 210" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="210" fill="#FBFBFD"/>
  <defs>
    <marker id="ae" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B6880"/>
    </marker>
  </defs>

  <text x="28" y="38" font-size="16" font-weight="600" fill="#1E1B2E">Epistemic evaluation: generate, propagate, test</text>
  <text x="28" y="56" font-size="11" fill="#6B6880">Candidate world views are enumerated, pruned, and tested entirely on the GPU; the founded ones are accepted.</text>

  <!-- device plane -->
  <path d="M28,80 H636 L648,92 V172 H28 Z" fill="#ECEBFB" stroke="#4F46E5" stroke-width="1.25"/>
  <rect x="40" y="86" width="104" height="15" rx="7.5" fill="#10B981"/>
  <text x="92" y="96.5" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF" letter-spacing="0.5" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">GPU-RESIDENT</text>

  <!-- Generate -->
  <rect x="44" y="110" width="184" height="50" rx="7" fill="#FBFBFD" stroke="#1E1B2E" stroke-width="1.25"/>
  <rect x="45.5" y="112" width="3.5" height="46" rx="1.75" fill="#0891B2"/>
  <text x="136" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#1E1B2E">Generate</text>
  <text x="136" y="147" text-anchor="middle" font-size="9.5" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">candidate views (2^k)</text>
  <path d="M228,135 H246" stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#ae)"/>

  <!-- Propagate -->
  <rect x="248" y="110" width="176" height="50" rx="7" fill="#FBFBFD" stroke="#1E1B2E" stroke-width="1.25"/>
  <rect x="249.5" y="112" width="3.5" height="46" rx="1.75" fill="#0891B2"/>
  <text x="336" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#1E1B2E">Propagate</text>
  <text x="336" y="147" text-anchor="middle" font-size="9.5" fill="#6B6880">prune inconsistent</text>
  <path d="M424,135 H442" stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#ae)"/>

  <!-- Test -->
  <rect x="444" y="110" width="188" height="50" rx="7" fill="#FBFBFD" stroke="#1E1B2E" stroke-width="1.25"/>
  <rect x="445.5" y="112" width="3.5" height="46" rx="1.75" fill="#0891B2"/>
  <text x="538" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#1E1B2E">Test</text>
  <text x="538" y="147" text-anchor="middle" font-size="9.5" fill="#6B6880">brave / cautious check</text>

  <!-- accepted -->
  <path d="M648,135 H688" stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#ae)"/>
  <rect x="690" y="110" width="182" height="50" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
  <rect x="691.5" y="112" width="3.5" height="46" rx="1.75" fill="#10B981"/>
  <text x="783" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#1E1B2E">Accepted</text>
  <text x="783" y="147" text-anchor="middle" font-size="9.5" fill="#6B6880">founded world views</text>

  <text x="28" y="198" font-size="10.5" fill="#6B6880">Candidate world views are bitvectors over the epistemic atoms; a per-reduction model cap bounds enumeration, and unfounded coupling fails closed.</text>
</svg>

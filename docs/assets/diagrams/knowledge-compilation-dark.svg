<!-- xlog diagram: knowledge compilation (dark). Source: docs ARCHITECTURE.md "Knowledge Compilation Pipeline" + probabilistic/engines page. PIR -> CNF -> GPU d-DNNF (compile+verify) -> XGCF -> weighted model counting; compile once, evaluate many. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 224" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="224" fill="#0E0E16"/>

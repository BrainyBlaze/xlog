    </marker>
  </defs>

  <text x="28" y="38" font-size="16" font-weight="600" fill="#E7E6F0">Exact inference by knowledge compilation</text>
  <text x="28" y="56" font-size="11" fill="#9B98B4">The circuit is compiled once; evaluation and gradients then run many times over the same structure.</text>

  <g>

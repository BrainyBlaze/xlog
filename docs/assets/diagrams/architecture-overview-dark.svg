<!-- xlog diagram: architecture overview (dark). Source of truth: docs ARCHITECTURE.md reasoning stack + crate structure. One shared frontend fans into four paradigm IRs; all execute on the GPU kernel provider. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="400" fill="#0E0E16"/>

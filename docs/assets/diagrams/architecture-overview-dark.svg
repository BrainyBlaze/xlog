  <text x="450" y="156" text-anchor="middle" font-size="12.5" font-weight="500" fill="#E7E6F0">Shared frontend</text>
  <text x="450" y="171" text-anchor="middle" font-size="10" fill="#9B98B4" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">parser &#183; stratifier &#183; lowerer &#183; optimizer</text>


    <rect x="60" y="264" width="52" height="17" rx="8.5" fill="#8B83F0" fill-opacity="0.2"/>
    <text x="86" y="276" text-anchor="middle" font-size="9.5" font-weight="600" fill="#A9A2F5" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">RIR</text>
  </g>

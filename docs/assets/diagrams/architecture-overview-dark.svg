  <text x="152" y="338.5" text-anchor="middle" font-size="9" font-weight="600" fill="#0E0E16" letter-spacing="0.5" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">GPU-RESIDENT</text>

  <text x="450" y="371" text-anchor="middle" font-size="10" fill="#9B98B4" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">joins &#183; sort &#183; group-by &#183; circuits &#183; CDCL</text>

  <text x="28" y="394" font-size="10.5" fill="#9B98B4">Neural-symbolic training runs over the deterministic and probabilistic paths, learning rule weights and neural predicates end-to-end.</text>

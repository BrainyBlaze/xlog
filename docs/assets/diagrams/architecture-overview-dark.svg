    <marker id="aad" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9B98B4"/>
    </marker>
  </defs>

  <text x="28" y="38" font-size="16" font-weight="600" fill="#E7E6F0">XLOG architecture</text>
  <text x="28" y="56" font-size="11" fill="#9B98B4">One typed frontend fans into four reasoning paradigms; all of them execute on a shared GPU kernel provider.</text>

  <rect x="390" y="76" width="120" height="38" rx="7" fill="#171626" stroke="#E7E6F0" stroke-width="1.25"/>

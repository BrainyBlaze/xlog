<!-- xlog diagram: neural-symbolic training loop (light). Source: README + dilp-training. Network produces predicate probabilities; the cached XGCF circuit evaluates the query; loss backpropagates through the circuit to network weights. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="240" fill="#FBFBFD"/>
  <defs>
    <marker id="an" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B6880"/>
    </marker>
  </defs>

  <text x="28" y="38" font-size="16" font-weight="600" fill="#1E1B2E">Neural-symbolic training loop</text>
  <text x="28" y="56" font-size="11" fill="#6B6880">A neural network feeds predicate probabilities into a cached circuit; the loss backpropagates through it to the weights.</text>

  <!-- Network -->
  <rect x="48" y="96" width="180" height="62" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
  <rect x="49.5" y="98" width="3.5" height="58" rx="1.75" fill="#E11D48"/>
  <text x="138" y="122" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1E1B2E">Neural network</text>
  <text x="138" y="139" text-anchor="middle" font-size="9.5" fill="#6B6880">PyTorch predicates</text>

  <!-- forward 1 -->
  <text x="294" y="120" text-anchor="middle" font-size="9.5" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">p(fact)</text>
  <path d="M228,127 H358" stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#an)"/>

  <!-- Circuit -->
  <path d="M360,96 H528 L540,108 V158 H360 Z" fill="#ECEBFB" stroke="#4F46E5" stroke-width="1.25"/>
  <rect x="372" y="103" width="30" height="13" rx="6.5" fill="#10B981"/>
  <text x="387" y="112.5" text-anchor="middle" font-size="7.5" font-weight="600" fill="#FFFFFF" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">GPU</text>
  <text x="450" y="130" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1E1B2E">XGCF circuit</text>
  <text x="450" y="147" text-anchor="middle" font-size="9.5" fill="#6B6880">cached across steps</text>

  <!-- forward 2 -->
  <text x="606" y="120" text-anchor="middle" font-size="9.5" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">P(query)</text>
  <path d="M540,127 H670" stroke="#6B6880" stroke-width="1.5" fill="none" marker-end="url(#an)"/>

  <!-- Loss -->
  <rect x="672" y="96" width="180" height="62" rx="7" fill="#F3F3F8" stroke="#1E1B2E" stroke-width="1.25"/>
  <text x="762" y="122" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1E1B2E">Loss</text>
  <text x="762" y="139" text-anchor="middle" font-size="9.5" fill="#6B6880">vs. target label</text>

  <!-- backward loop -->
  <path d="M762,158 V192 H138 V160" stroke="#6B6880" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#an)"/>
  <text x="450" y="186" text-anchor="middle" font-size="9.5" fill="#6B6880" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace">gradients back through the circuit &#8594; network weights</text>

  <text x="28" y="228" font-size="10.5" fill="#6B6880">Only weights change between iterations; the circuit structure is compiled once and reused, keeping every step GPU-resident.</text>
</svg>
